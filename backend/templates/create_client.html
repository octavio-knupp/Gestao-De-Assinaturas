{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=[device-width], initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>NetPay - Cadastro</title>
</head>

<body>
    <div class="container">
        <div class="form-img">
            <img src="{% static 'img/cloudflare.svg' %}" alt="">
        </div>

        <div class="form">
            <form method="POST">
    {% csrf_token %}

    <div class="input-group">
        <div class="input-box">
            <label>Primeiro nome</label>
            <input type="text" name="first_name" placeholder="Digite o seu primeiro nome" required>
        </div>

        <div class="input-box">
            <label>Sobrenome</label>
            <input type="text" name="last_name" placeholder="Digite o seu sobrenome" required>
        </div>

        <div class="input-box">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="Digite seu email" required>
        </div>

        <div class="input-box">
            <label>Celular</label>
            <input type="text" name="phone" placeholder="(xx) xxxx-xxxx" required>
        </div>

        <div class="input-box">
            <label>Senha</label>
            <input type="password" name="password" placeholder="Digite sua senha" required>
        </div>

        <div class="input-box">
            <label>Confirmar Senha</label>
            <input type="password" name="confirm_password" placeholder="Confirme sua senha" required>
        </div>

        <div class="gender-inputs">
            <h6>Gênero</h6>

            <input type="radio" name="gender" value="M" required> Masculino
            <input type="radio" name="gender" value="F"> Feminino
            <input type="radio" name="gender" value="O"> Outro
        </div>

        <div class="continue-button">
            <button type="submit">Continuar</button>
        </div>
    </div>
</form>
        </div>
    </div>
</body>

</html>
