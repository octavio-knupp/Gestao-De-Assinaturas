{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
   <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <title>N/A</title>
</head>

<body>
    <div class="container">
        <div class="form-box-login">
            <form action="">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Nome de usuário" required>
                    <svg class="i" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 24 24">
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path
                            d="M12 2a5 5 0 1 0 0 10 5 5 0 1 0 0-10M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1">
                        </path>
                    </svg>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <svg class="i" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 24 24">
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path
                            d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9z">
                        </path>
                    </svg>
                </div>
                <div class="forgot-link">
                    <a href="#">Esqueci minha senha</a>
                </div>
                <div class="input-box">
                    <button type="submit" class="btn">Entrar</button>
                    <p>ou faça login com plataformas sociais</p>
                    <div class="social-icons">
                        <a href="#"><img width="30" height="30"
                                src="https://img.icons8.com/ios-glyphs/30/google-logo--v1.png" alt="google-logo--v1" />

                            <a href="#"><img width="30" height="30"
                                    src="https://img.icons8.com/ios-glyphs/30/facebook-new.png" alt="facebook-new" />

                                <a href="#"><img width="30" height="30"
                                        src="https://img.icons8.com/ios-glyphs/30/github.png" alt="github" />

                                    <a href="#"><img width="30" height="30"
                                            src="https://img.icons8.com/ios-glyphs/30/linkedin.png" alt="linkedin" />
                    </div>
            </form>
        </div>
    </div>
</body>

</html>
